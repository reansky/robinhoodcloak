<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="style.css">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robinhood Cloak $RHC</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050505;
    color:white;
}


header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
}


.brand{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:22px;
    font-weight:bold;
}


.brand img{
    width:45px;
    height:45px;
    object-fit:contain;
}


.hero{
    min-height:85vh;
    padding:40px 8%;
    display:flex;
    align-items:center;
    justify-content:space-between;
}


.content{
    max-width:550px;
}


h1{
    font-size:60px;
}


h1 span{
    color:#00ff66;
}


p{
    margin-top:20px;
    color:#aaa;
    font-size:18px;
    line-height:1.6;
}


.btn{
    margin-top:30px;
}


.btn a{
    display:inline-block;
    padding:14px 25px;
    background:#00ff66;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}


.hero-image img{

    width:420px;
    max-width:100%;
    height:auto;
    display:block;

}


.card{

    margin:20px 8%;
    background:#111;
    padding:25px;
    border-radius:20px;

}


.card h2{
    color:#00ff66;
}



@media(max-width:900px){

.hero{

    flex-direction:column;
    text-align:center;

}


h1{

    font-size:40px;

}


.hero-image img{

    margin-top:40px;

}

}


</style>

</head>


<body>


<header>

<div class="brand">

<img src="./logo.png">

<span>Robinhood Cloak</span>

</div>

</header>



<section class="hero">


<div class="content">

<h1>
The Future Of
<span>$RHC</span>
</h1>


<p>
A community driven meme token built for the Robinhood Chain ecosystem.
Memes, community and Web3 culture combined.
</p>


<div class="btn">

<a href="#">
Buy $RHC
</a>

</div>


</div>



<div class="hero-image">

<img src="./hero.png">

</div>


</section>



<div class="card">

<h2>
Robinhood Cloak $RHC
</h2>

<p>
Chain: Robinhood Chain<br>
Contract: Coming Soon
</p>

</div>



</body>
</html>
